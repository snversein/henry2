{% extends "base.html" %}

{% block title %}Login - Henry's Store{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-16">
    <div class="container mx-auto px-4">
        <div class="max-w-md mx-auto">
            <div class="bg-white rounded-3xl shadow-lg p-8">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold">Welcome Back!</h1>
                    <p class="text-gray-500 mt-2">Sign in to continue shopping</p>
                </div>
                
                <form method="POST" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" name="email" required class="w-full border border-gray-200 rounded-xl pl-12 pr-4 py-3 focus:outline-none focus:border-green-500" placeholder="your@email.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" name="password" required class="w-full border border-gray-200 rounded-xl pl-12 pr-4 py-3 focus:outline-none focus:border-green-500" placeholder="Enter your password">
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" class="w-4 h-4 text-green-600 rounded border-gray-300">
                            <span class="ml-2 text-sm text-gray-600">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-green-700 hover:underline">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="w-full btn-primary text-white py-4 rounded-xl font-semibold">
                        Sign In
                    </button>
                </form>
                
                <div class="mt-8">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-200"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-white text-gray-500">Or continue with</span>
                        </div>
                    </div>
                    <div class="mt-6 grid grid-cols-2 gap-4">
                        <button class="flex items-center justify-center gap-2 border border-gray-200 rounded-xl py-3 hover:bg-gray-50 transition">
                            <i class="fab fa-google text-red-500"></i>
                            <span class="font-medium">Google</span>
                        </button>
                        <button class="flex items-center justify-center gap-2 border border-gray-200 rounded-xl py-3 hover:bg-gray-50 transition">
                            <i class="fab fa-facebook text-blue-600"></i>
                            <span class="font-medium">Facebook</span>
                        </button>
                    </div>
                </div>
                
                <p class="text-center text-gray-600 mt-8">
                    Don't have an account? 
                    <a href="{{ url_for('register') }}" class="text-green-700 font-semibold hover:underline">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
