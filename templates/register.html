{% extends "base.html" %}

{% block title %}Create Account - Henry's Store{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-16">
    <div class="container mx-auto px-4">
        <div class="max-w-md mx-auto">
            <div class="bg-white rounded-3xl shadow-lg p-8">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold">Create Account</h1>
                    <p class="text-gray-500 mt-2">Join Henry's Store today</p>
                </div>
                
                <form method="POST" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" name="name" required class="w-full border border-gray-200 rounded-xl pl-12 pr-4 py-3 focus:outline-none focus:border-green-500" placeholder="Enter your full name">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address *</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" name="email" required class="w-full border border-gray-200 rounded-xl pl-12 pr-4 py-3 focus:outline-none focus:border-green-500" placeholder="your@email.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <i class="fas fa-phone"></i>
                            </span>
                            <input type="tel" name="phone" class="w-full border border-gray-200 rounded-xl pl-12 pr-4 py-3 focus:outline-none focus:border-green-500" placeholder="+91 98765 43210">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Address</label>
                        <div class="relative">
                            <span class="absolute left-4 top-4 text-gray-400">
                                <i class="fas fa-map-marker-alt"></i>
                            </span>
                            <textarea name="address" rows="2" class="w-full border border-gray-200 rounded-xl pl-12 pr-4 py-3 focus:outline-none focus:border-green-500" placeholder="Your address"></textarea>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password *</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" name="password" required class="w-full border border-gray-200 rounded-xl pl-12 pr-4 py-3 focus:outline-none focus:border-green-500" placeholder="Create a strong password">
                        </div>
                    </div>
                    
                    <div class="flex items-start">
                        <input type="checkbox" required class="w-4 h-4 mt-1 text-green-600 rounded border-gray-300">
                        <span class="ml-2 text-sm text-gray-600">I agree to the <a href="#" class="text-green-700">Terms of Service</a> and <a href="#" class="text-green-700">Privacy Policy</a></span>
                    </div>
                    
                    <button type="submit" class="w-full btn-primary text-white py-4 rounded-xl font-semibold">
                        Create Account
                    </button>
                </form>
                
                <div class="mt-8">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-200"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-white text-gray-500">Or register with</span>
                        </div>
                    </div>
                    <div class="mt-6 grid grid-cols-2 gap-4">
                        <button class="flex items-center justify-center gap-2 border border-gray-200 rounded-xl py-3 hover:bg-gray-50 transition">
                            <i class="fab fa-google text-red-500"></i>
                            <span class="font-medium">Google</span>
                        </button>
                        <button class="flex items-center justify-center gap-2 border border-gray-200 rounded-xl py-3 hover:bg-gray-50 transition">
                            <i class="fab fa-facebook text-blue-600"></i>
                            <span class="font-medium">Facebook</span>
                        </button>
                    </div>
                </div>
                
                <p class="text-center text-gray-600 mt-8">
                    Already have an account? 
                    <a href="{{ url_for('login') }}" class="text-green-700 font-semibold hover:underline">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
